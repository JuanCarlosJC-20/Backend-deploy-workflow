name: Build & Compile

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore Backend/Web/Web.csproj
    
    - name: Build
      run: dotnet build Backend/Web/Web.csproj -c Release --no-restore
    
    - name: ✅ Build Successful
      if: success()
      run: echo "✅ Compilación exitosa en ${{ github.ref }}"
